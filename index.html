<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids Neon - Temporal Edition v2.0</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a12;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50%;
            display: flex;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50%;
            height: 100%;
            pointer-events: all;
            touch-action: none;
        }
        #joystick-visual {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            pointer-events: none;
        }
        #fireButton {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 24px;
            padding: 20px 25px;
            border-radius: 50%;
            background: rgba(255, 0, 100, 0.2);
            color: #ff0064;
            border: 2px solid #ff0064;
            pointer-events: all;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.8);
            z-index: 50;
        }
        #specialButton {
            position: absolute;
            right: 100px;
            bottom: 20px;
            font-size: 20px;
            padding: 15px 20px;
            border-radius: 50%;
            background: rgba(128, 0, 255, 0.2);
            color: #8000ff;
            border: 2px solid #8000ff;
            pointer-events: all;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(128, 0, 255, 0.5);
            text-shadow: 0 0 10px rgba(128, 0, 255, 0.8);
            z-index: 50;
        }
        #hyperspaceButton {
            position: absolute;
            right: 20px;
            bottom: 120px;
            font-size: 20px;
            padding: 15px 20px;
            border-radius: 50%;
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 2px solid #00ff64;
            pointer-events: all;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.5);
            text-shadow: 0 0 10px rgba(0, 255, 100, 0.8);
            z-index: 50;
        }
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(0, 255, 255, 0.06) 1px,
                transparent 1px
            );
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 100;
        }
        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 99;
            transition: transform 0.3s ease-in-out, opacity 0.3s ease;
        }
        .grid.time-warp {
            transform: scale(1.05) skew(2deg, 1deg);
            opacity: 0.7;
        }
        .grid.hyperspace {
            transform: scale(1.1) rotate(2deg);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="grid" id="gridOverlay"></div>
    <div class="scanlines"></div>
    <div class="controls">
        <div id="joystick-zone"></div>
        <div id="joystick-visual"></div>
        <button id="hyperspaceButton">🌌</button>
        <button id="specialButton">⏱️</button>
        <button id="fireButton">⚡</button>
    </div>

    <script>
    // ===== MAIN INITIALIZATION =====
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gridOverlay = document.getElementById("gridOverlay");
    const fireButton = document.getElementById("fireButton");
    const specialButton = document.getElementById("specialButton");
    const hyperspaceButton = document.getElementById("hyperspaceButton");
    const joystickVisual = document.getElementById("joystick-visual");
    const joystickZone = document.getElementById("joystick-zone");

    // ===== OBJECT POOL SYSTEM =====
    class ObjectPool {
        constructor(factory, initialSize = 100) {
            this.factory = factory;
            this.pool = [];
            this.activeCount = 0;
            for (let i = 0; i < initialSize; i++) {
                this.pool.push({ ...factory(), active: false, id: i });
            }
        }
        
        acquire() {
            for (let i = 0; i < this.pool.length; i++) {
                if (!this.pool[i].active) {
                    this.pool[i].active = true;
                    this.activeCount++;
                    return this.pool[i];
                }
            }
            const obj = { ...this.factory(), active: true, id: this.pool.length };
            this.pool.push(obj);
            this.activeCount++;
            return obj;
        }
        
        release(obj) {
            if (obj.active) {
                obj.active = false;
                this.activeCount--;
            }
        }
        
        forEachActive(callback) {
            for (let i = 0; i < this.pool.length; i++) {
                if (this.pool[i].active) {
                    callback(this.pool[i], i);
                }
            }
        }
        
        releaseAll() {
            for (let i = 0; i < this.pool.length; i++) {
                this.pool[i].active = false;
            }
            this.activeCount = 0;
        }
    }

    const bulletFactory = () => ({ x: 0, y: 0, velX: 0, velY: 0, life: 0, temporal: false });
    const particleFactory = () => ({ x: 0, y: 0, velX: 0, velY: 0, size: 1, life: 0, color: '#00ffff' });
    const explosionFactory = () => ({ x: 0, y: 0, velX: 0, velY: 0, size: 1, life: 0, color: '#ff5500' });

    const bulletPool = new ObjectPool(bulletFactory, 200);
    const particlePool = new ObjectPool(particleFactory, 500);
    const explosionPool = new ObjectPool(explosionFactory, 300);

    // ===== WEB AUDIO SYNTHESIS SYSTEM =====
    let audioCtx = null;
    let engineOsc = null;
    let engineGain = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (!engineOsc && audioCtx) {
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            const engineFilter = audioCtx.createBiquadFilter();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(60, audioCtx.currentTime);
            engineFilter.type = 'lowpass';
            engineFilter.frequency.setValueAtTime(200, audioCtx.currentTime);
            engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            engineOsc.connect(engineFilter);
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }
    }
    
    function updateEngineSound(acceleration) {
        if (!engineOsc || !engineGain) return;
        const now = audioCtx.currentTime;
        const baseFreq = 60;
        const maxFreq = 250;
        const targetFreq = baseFreq + (acceleration * (maxFreq - baseFreq));
        const targetGain = Math.min(0.06, acceleration * 0.12);
        engineOsc.frequency.linearRampToValueAtTime(targetFreq, now + 0.05);
        engineGain.gain.linearRampToValueAtTime(targetGain, now + 0.05);
    }
    
    function playTone(frequency, duration, type = 'square', volume = 0.1, detune = 0) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        osc.detune.setValueAtTime(detune, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    }
    
    function playFireSound() {
        playTone(800, 0.08, 'square', 0.06);
        playTone(1200, 0.05, 'square', 0.04, 0.03);
    }
    
    function playTimeWarpSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.8);
        playTone(100, 0.6, 'triangle', 0.08);
        setTimeout(() => playTone(150, 0.3, 'sine', 0.06), 200);
    }
    
    function playHyperspaceSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.3);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(5000, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.5);
    }
    
    function playComboSound(comboLevel) {
        const baseFreq = 400 + (comboLevel * 100);
        playTone(baseFreq, 0.1, 'square', 0.05);
        setTimeout(() => playTone(baseFreq * 1.25, 0.08, 'square', 0.04), 50);
        if (comboLevel >= 5) {
            setTimeout(() => playTone(baseFreq * 1.5, 0.12, 'square', 0.06), 100);
        }
        if (comboLevel >= 8) {
            setTimeout(() => playTone(baseFreq * 2, 0.15, 'triangle', 0.07), 150);
        }
    }
    
    function playExplosionSound() {
        const bufferSize = audioCtx.sampleRate * 0.15;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.08));
        }
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        source.buffer = buffer;
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1500, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(audioCtx.currentTime);
    }
    
    function playPowerUpSound() {
        playTone(600, 0.06, 'sine', 0.07);
        setTimeout(() => playTone(800, 0.06, 'sine', 0.07), 60);
        setTimeout(() => playTone(1000, 0.08, 'sine', 0.09), 120);
    }

    // ===== GALACTIC NEBULA BACKGROUND SYSTEM =====
    const nebulaConfig = {
        starCount: 300,
        nebulaStars: 200,
        dustCount: 400,
        darkMatterCount: 50,
        cloudCount: 8,
        filamentCount: 20,
        riftCount: 6,
        parallaxFactor: 0.02,
        colorPalettes: {
            normal: { 
                primary: [200, 240],
                secondary: [260, 300],
                saturation: [40, 70],
                lightness: [20, 60]
            },
            timeWarp: {
                primary: [260, 300],
                secondary: [280, 320],
                saturation: [60, 90],
                lightness: [30, 70]
            },
            hyperspace: {
                primary: [120, 160],
                secondary: [140, 180],
                saturation: [50, 80],
                lightness: [25, 65]
            }
        }
    };

    let nebulaElements = {
        stars: [],
        nebulaStars: [],
        dustParticles: [],
        darkMatter: [],
        cloudFormations: [],
        gasFilaments: [],
        energyRifts: []
    };

    let nebulaCanvas = null;
    let nebulaCtx = null;

    function generateStarfield() {
        nebulaElements.stars = [];
        for (let i = 0; i < nebulaConfig.starCount; i++) {
            nebulaElements.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.3,
                brightness: Math.random() * 0.7 + 0.3,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleOffset: Math.random() * Math.PI * 2,
                colorTemp: Math.random(),
                parallaxDepth: Math.random() * 0.8 + 0.2
            });
        }
    }

    function generateNebulaStars() {
        nebulaElements.nebulaStars = [];
        for (let i = 0; i < nebulaConfig.nebulaStars; i++) {
            const clusterX = (Math.sin(i * 0.7) * 0.3 + 0.5) * canvas.width;
            const clusterY = (Math.cos(i * 0.5) * 0.3 + 0.5) * canvas.height;
            nebulaElements.nebulaStars.push({
                x: clusterX + (Math.random() - 0.5) * canvas.width * 0.6,
                y: clusterY + (Math.random() - 0.5) * canvas.height * 0.6,
                size: Math.random() * 3 + 1,
                brightness: Math.random() * 0.5 + 0.5,
                pulsePhase: Math.random() * Math.PI * 2,
                pulseSpeed: Math.random() * 0.01 + 0.005,
                hue: Math.random() * 30 + 200
            });
        }
    }

    function generateCosmicDust() {
        nebulaElements.dustParticles = [];
        for (let i = 0; i < nebulaConfig.dustCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * Math.min(canvas.width, canvas.height) * 0.7;
            const centerX = canvas.width / 2 + Math.cos(angle * 0.3) * canvas.width * 0.2;
            const centerY = canvas.height / 2 + Math.sin(angle * 0.7) * canvas.height * 0.2;
            nebulaElements.dustParticles.push({
                x: centerX + Math.cos(angle) * radius,
                y: centerY + Math.sin(angle) * radius,
                size: Math.random() * 1.5 + 0.2,
                alpha: Math.random() * 0.3 + 0.05,
                hue: Math.random() * 40 + 200,
                saturation: Math.random() * 30 + 40,
                driftX: (Math.random() - 0.5) * 0.1,
                driftY: (Math.random() - 0.5) * 0.1
            });
        }
    }

    function generateDarkMatter() {
        nebulaElements.darkMatter = [];
        for (let i = 0; i < nebulaConfig.darkMatterCount; i++) {
            nebulaElements.darkMatter.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                length: Math.random() * 100 + 30,
                angle: Math.random() * Math.PI * 2,
                width: Math.random() * 3 + 1,
                alpha: Math.random() * 0.15 + 0.02,
                curvature: (Math.random() - 0.5) * 0.5,
                driftSpeed: Math.random() * 0.02 + 0.005
            });
        }
    }

    function generateCloudFormations() {
        nebulaElements.cloudFormations = [];
        for (let i = 0; i < nebulaConfig.cloudCount; i++) {
            const cloudX = (Math.sin(i * 1.3) * 0.35 + 0.5) * canvas.width;
            const cloudY = (Math.cos(i * 0.9) * 0.35 + 0.5) * canvas.height;
            nebulaElements.cloudFormations.push({
                x: cloudX,
                y: cloudY,
                radiusX: Math.random() * canvas.width * 0.3 + canvas.width * 0.1,
                radiusY: Math.random() * canvas.height * 0.2 + canvas.height * 0.08,
                rotation: Math.random() * Math.PI * 2,
                alpha: Math.random() * 0.08 + 0.03,
                hue: Math.random() * 40 + 200,
                saturation: Math.random() * 30 + 40,
                lightness: Math.random() * 20 + 30,
                subClouds: Math.floor(Math.random() * 5) + 3,
                pulsePhase: Math.random() * Math.PI * 2
            });
        }
    }

    function generateGasFilaments() {
        nebulaElements.gasFilaments = [];
        for (let i = 0; i < nebulaConfig.filamentCount; i++) {
            const points = [];
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            for (let j = 0; j < 8; j++) {
                points.push({ x, y });
                x += (Math.random() - 0.5) * canvas.width * 0.2;
                y += (Math.random() - 0.5) * canvas.height * 0.2;
            }
            nebulaElements.gasFilaments.push({
                points,
                width: Math.random() * 30 + 10,
                alpha: Math.random() * 0.04 + 0.01,
                hue: Math.random() * 40 + 200,
                saturation: Math.random() * 40 + 20,
                lightness: Math.random() * 30 + 25
            });
        }
    }

    function generateEnergyRifts() {
        nebulaElements.energyRifts = [];
        for (let i = 0; i < nebulaConfig.riftCount; i++) {
            const points = [];
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            points.push({ x, y });
            for (let j = 0; j < 5; j++) {
                x += (Math.random() - 0.5) * canvas.width * 0.15;
                y += (Math.random() - 0.5) * canvas.height * 0.15;
                points.push({ x, y });
            }
            nebulaElements.energyRifts.push({
                points,
                width: Math.random() * 2 + 0.5,
                alpha: Math.random() * 0.15 + 0.05,
                hue: 180 + Math.random() * 60,
                pulsePhase: Math.random() * Math.PI * 2,
                pulseSpeed: Math.random() * 0.02 + 0.01
            });
        }
    }

    function initNebulaSystem() {
        if (!nebulaCanvas) {
            nebulaCanvas = document.createElement('canvas');
            nebulaCtx = nebulaCanvas.getContext('2d');
        }
        nebulaCanvas.width = canvas.width;
        nebulaCanvas.height = canvas.height;
        generateStarfield();
        generateNebulaStars();
        generateCosmicDust();
        generateDarkMatter();
        generateCloudFormations();
        generateGasFilaments();
        generateEnergyRifts();
    }

    function getCurrentPalette() {
        if (hyperspaceActive) return nebulaConfig.colorPalettes.hyperspace;
        if (timeWarpActive) return nebulaConfig.colorPalettes.timeWarp;
        return nebulaConfig.colorPalettes.normal;
    }

    function renderNebulaBackground() {
        if (!nebulaCtx) initNebulaSystem();
        const palette = getCurrentPalette();
        const time = Date.now() * 0.0003;
        
        nebulaCtx.clearRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);
        nebulaCtx.fillStyle = '#0a0a12';
        nebulaCtx.fillRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);
        
        // Draw dark matter
        nebulaElements.darkMatter.forEach(dm => {
            nebulaCtx.save();
            nebulaCtx.translate(dm.x, dm.y);
            nebulaCtx.rotate(dm.angle + Math.sin(time + dm.x) * dm.curvature);
            const gradient = nebulaCtx.createLinearGradient(0, 0, dm.length, 0);
            gradient.addColorStop(0, 'rgba(10, 5, 20, 0)');
            gradient.addColorStop(0.5, `rgba(15, 10, 30, ${dm.alpha})`);
            gradient.addColorStop(1, 'rgba(10, 5, 20, 0)');
            nebulaCtx.strokeStyle = gradient;
            nebulaCtx.lineWidth = dm.width;
            nebulaCtx.beginPath();
            nebulaCtx.moveTo(0, 0);
            nebulaCtx.lineTo(dm.length, 0);
            nebulaCtx.stroke();
            dm.angle += dm.driftSpeed;
            nebulaCtx.restore();
        });
        
        // Draw gas filaments
        nebulaElements.gasFilaments.forEach(filament => {
            if (filament.points.length < 2) return;
            nebulaCtx.save();
            const gradient = nebulaCtx.createLinearGradient(
                filament.points[0].x, filament.points[0].y,
                filament.points[filament.points.length - 1].x,
                filament.points[filament.points.length - 1].y
            );
            gradient.addColorStop(0, `hsla(${filament.hue}, ${filament.saturation}%, ${filament.lightness}%, 0)`);
            gradient.addColorStop(0.3, `hsla(${filament.hue}, ${filament.saturation}%, ${filament.lightness}%, ${filament.alpha})`);
            gradient.addColorStop(0.7, `hsla(${filament.hue + 10}, ${filament.saturation}%, ${filament.lightness + 5}%, ${filament.alpha * 0.8})`);
            gradient.addColorStop(1, `hsla(${filament.hue}, ${filament.saturation}%, ${filament.lightness}%, 0)`);
            nebulaCtx.strokeStyle = gradient;
            nebulaCtx.lineWidth = filament.width;
            nebulaCtx.lineCap = 'round';
            nebulaCtx.beginPath();
            nebulaCtx.moveTo(filament.points[0].x, filament.points[0].y);
            for (let i = 1; i < filament.points.length - 1; i++) {
                const xc = (filament.points[i].x + filament.points[i + 1].x) / 2;
                const yc = (filament.points[i].y + filament.points[i + 1].y) / 2;
                nebulaCtx.quadraticCurveTo(filament.points[i].x, filament.points[i].y, xc, yc);
            }
            nebulaCtx.lineTo(filament.points[filament.points.length - 1].x, filament.points[filament.points.length - 1].y);
            nebulaCtx.stroke();
            nebulaCtx.restore();
        });
        
        // Draw cloud formations
        nebulaElements.cloudFormations.forEach(cloud => {
            nebulaCtx.save();
            nebulaCtx.translate(cloud.x, cloud.y);
            nebulaCtx.rotate(cloud.rotation);
            const pulse = Math.sin(time * 100 + cloud.pulsePhase) * 0.3 + 0.7;
            const gradient = nebulaCtx.createRadialGradient(0, 0, 0, 0, 0, cloud.radiusX);
            gradient.addColorStop(0, `hsla(${cloud.hue}, ${cloud.saturation}%, ${cloud.lightness + 10}%, ${cloud.alpha * pulse * 1.5})`);
            gradient.addColorStop(0.4, `hsla(${cloud.hue}, ${cloud.saturation}%, ${cloud.lightness}%, ${cloud.alpha * pulse})`);
            gradient.addColorStop(0.7, `hsla(${cloud.hue + 20}, ${cloud.saturation - 10}%, ${cloud.lightness - 5}%, ${cloud.alpha * pulse * 0.5})`);
            gradient.addColorStop(1, `hsla(${cloud.hue + 30}, ${cloud.saturation - 20}%, ${cloud.lightness - 10}%, 0)`);
            nebulaCtx.fillStyle = gradient;
            nebulaCtx.beginPath();
            nebulaCtx.ellipse(0, 0, cloud.radiusX, cloud.radiusY, 0, 0, Math.PI * 2);
            nebulaCtx.fill();
            for (let i = 0; i < cloud.subClouds; i++) {
                const sx = Math.sin(i * 2.4) * cloud.radiusX * 0.5;
                const sy = Math.cos(i * 1.8) * cloud.radiusY * 0.5;
                const sRadius = cloud.radiusX * (0.2 + Math.random() * 0.3);
                const subGradient = nebulaCtx.createRadialGradient(sx, sy, 0, sx, sy, sRadius);
                subGradient.addColorStop(0, `hsla(${cloud.hue + 15}, ${cloud.saturation}%, ${cloud.lightness + 15}%, ${cloud.alpha * pulse * 0.8})`);
                subGradient.addColorStop(1, `hsla(${cloud.hue + 25}, ${cloud.saturation - 15}%, ${cloud.lightness - 5}%, 0)`);
                nebulaCtx.fillStyle = subGradient;
                nebulaCtx.beginPath();
                nebulaCtx.arc(sx, sy, sRadius, 0, Math.PI * 2);
                nebulaCtx.fill();
            }
            nebulaCtx.restore();
        });
        
        // Draw cosmic dust
        nebulaElements.dustParticles.forEach(dust => {
            const twinkle = Math.sin(time * 200 + dust.x) * 0.3 + 0.7;
            nebulaCtx.fillStyle = `hsla(${dust.hue}, ${dust.saturation}%, 50%, ${dust.alpha * twinkle})`;
            nebulaCtx.beginPath();
            nebulaCtx.arc(dust.x, dust.y, dust.size, 0, Math.PI * 2);
            nebulaCtx.fill();
            dust.x += dust.driftX;
            dust.y += dust.driftY;
            if (dust.x < -10) dust.x = nebulaCanvas.width + 10;
            if (dust.x > nebulaCanvas.width + 10) dust.x = -10;
            if (dust.y < -10) dust.y = nebulaCanvas.height + 10;
            if (dust.y > nebulaCanvas.height + 10) dust.y = -10;
        });
        
        // Draw energy rifts
        nebulaElements.energyRifts.forEach(rift => {
            if (rift.points.length < 2) return;
            const pulse = Math.sin(time * rift.pulseSpeed * 1000 + rift.pulsePhase) * 0.5 + 0.5;
            nebulaCtx.strokeStyle = `hsla(${rift.hue}, 80%, 60%, ${rift.alpha * pulse})`;
            nebulaCtx.lineWidth = rift.width;
            nebulaCtx.shadowColor = `hsla(${rift.hue}, 80%, 60%, ${rift.alpha * pulse})`;
            nebulaCtx.shadowBlur = 8;
            nebulaCtx.beginPath();
            nebulaCtx.moveTo(rift.points[0].x, rift.points[0].y);
            for (let i = 1; i < rift.points.length; i++) {
                const midX = (rift.points[i-1].x + rift.points[i].x) / 2;
                const midY = (rift.points[i-1].y + rift.points[i].y) / 2;
                const offset = (Math.random() - 0.5) * 20 * pulse;
                nebulaCtx.lineTo(midX + offset, midY + offset);
                nebulaCtx.lineTo(rift.points[i].x, rift.points[i].y);
            }
            nebulaCtx.stroke();
            nebulaCtx.shadowBlur = 0;
        });
        
        // Draw nebula stars
        nebulaElements.nebulaStars.forEach(star => {
            const pulse = Math.sin(time * star.pulseSpeed * 100000 + star.pulsePhase) * 0.3 + 0.7;
            const alpha = star.brightness * pulse;
            const gradient = nebulaCtx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.size * 3);
            gradient.addColorStop(0, `hsla(${star.hue}, 60%, 80%, ${alpha})`);
            gradient.addColorStop(0.3, `hsla(${star.hue}, 80%, 60%, ${alpha * 0.6})`);
            gradient.addColorStop(1, `hsla(${star.hue}, 100%, 40%, 0)`);
            nebulaCtx.fillStyle = gradient;
            nebulaCtx.beginPath();
            nebulaCtx.arc(star.x, star.y, star.size * 3, 0, Math.PI * 2);
            nebulaCtx.fill();
            nebulaCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            nebulaCtx.beginPath();
            nebulaCtx.arc(star.x, star.y, star.size * 0.5, 0, Math.PI * 2);
            nebulaCtx.fill();
        });
        
        // Draw background stars
        nebulaElements.stars.forEach(star => {
            const twinkle = Math.sin(time * star.twinkleSpeed * 50000 + star.twinkleOffset) * 0.4 + 0.6;
            const alpha = star.brightness * twinkle;
            const r = 180 + star.colorTemp * 75;
            const g = 200 + star.colorTemp * 40;
            const b = 255 - star.colorTemp * 55;
            nebulaCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            nebulaCtx.fillRect(star.x, star.y, star.size, star.size);
            if (star.brightness > 0.7) {
                const flareAlpha = alpha * 0.3;
                nebulaCtx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${flareAlpha})`;
                nebulaCtx.lineWidth = 0.5;
                nebulaCtx.beginPath();
                nebulaCtx.moveTo(star.x - star.size * 4, star.y);
                nebulaCtx.lineTo(star.x + star.size * 4, star.y);
                nebulaCtx.stroke();
                nebulaCtx.beginPath();
                nebulaCtx.moveTo(star.x, star.y - star.size * 4);
                nebulaCtx.lineTo(star.x, star.y + star.size * 4);
                nebulaCtx.stroke();
            }
        });
        
        ctx.drawImage(nebulaCanvas, 0, 0);
    }

    function updateNebulaBackground() {
        if (!nebulaCtx) return;
        if (ship.alive) {
            const parallaxX = ship.velX * nebulaConfig.parallaxFactor;
            const parallaxY = ship.velY * nebulaConfig.parallaxFactor;
            nebulaElements.stars.forEach(star => {
                star.x -= parallaxX * star.parallaxDepth;
                star.y -= parallaxY * star.parallaxDepth;
                if (star.x < -5) star.x += canvas.width + 10;
                if (star.x > canvas.width + 5) star.x -= canvas.width + 10;
                if (star.y < -5) star.y += canvas.height + 10;
                if (star.y > canvas.height + 5) star.y -= canvas.height + 10;
            });
        }
        if (nebulaCanvas.width !== canvas.width || nebulaCanvas.height !== canvas.height) {
            nebulaCanvas.width = canvas.width;
            nebulaCanvas.height = canvas.height;
            initNebulaSystem();
        }
    }

    function resizeNebula() {
        if (nebulaCanvas) {
            nebulaCanvas.width = canvas.width;
            nebulaCanvas.height = canvas.height;
            initNebulaSystem();
        }
    }

    function createBoulderShape(size) {
        const points = [];
        const numPoints = 8 + Math.floor(Math.random() * 5);
        for (let i = 0; i < numPoints; i++) {
            const angle = (i / numPoints) * Math.PI * 2;
            const radius = size / 2 * (0.7 + Math.random() * 0.3);
            points.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius });
        }
        return points;
    }

    function spawnAsteroid(x, y, speedX, speedY, size, frozen = false) {
        asteroids.push({
            x, y, speedX, speedY, size,
            hitsRequired: level,
            hitsTaken: 0,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.05,
            shape: createBoulderShape(size),
            frozen,
            originalSpeedX: frozen ? speedX : 0,
            originalSpeedY: frozen ? speedY : 0,
            originalRotationSpeed: frozen ? 0 : 0,
            trail: []
        });
    }

    function createAsteroids(count = 3, x = null, y = null, size = 60) {
        for (let i = 0; i < count; i++) {
            spawnAsteroid(
                x || Math.random() * canvas.width,
                y || Math.random() * canvas.height,
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2,
                size
            );
        }
    }

    function spawnExplosionParticles(x, y, count, color, parentVelX = 0, parentVelY = 0) {
        for (let i = 0; i < count; i++) {
            const p = explosionPool.acquire();
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5;
            p.x = x;
            p.y = y;
            p.velX = Math.cos(angle) * speed + parentVelX * 0.3;
            p.velY = Math.sin(angle) * speed + parentVelY * 0.3;
            p.size = Math.random() * 3 + 1;
            p.life = 1.0;
            p.color = color;
        }
    }

    function spawnParticle(x, y, velX, velY, color = '#00ffff') {
        const p = particlePool.acquire();
        p.x = x;
        p.y = y;
        p.velX = velX;
        p.velY = velY;
        p.size = Math.random() * 2 + 0.5;
        p.life = 1.0;
        p.color = color;
    }

    function spawnBullet(x, y, velX, velY, life = 60, temporal = false) {
        const b = bulletPool.acquire();
        b.x = x;
        b.y = y;
        b.velX = velX;
        b.velY = velY;
        b.life = life;
        b.temporal = temporal;
    }

    function spawnPowerUp(x, y) {
        const rand = Math.random();
        let availableTypes = ['RAPID_FIRE', 'SHIELD'];
        if (!extraLifeSpawnedThisLevel && lives < 3) availableTypes.push('EXTRA_LIFE');
        if (rand < 0.15) availableTypes.push('TIME_CHARGE');
        if (rand < 0.15) availableTypes.push('HYPERSPACE_CHARGE');
        if (rand < 0.05 && level >= 3) availableTypes.push('TEMPORAL_SHIFT');
        const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
        if (type === 'EXTRA_LIFE') extraLifeSpawnedThisLevel = true;
        powerUps.push({ x, y, type, size: 25, life: 500 });
    }

    function createTemporalEcho(x, y) {
        temporalEchoes.push({ x, y, alpha: 0.5, radius: 30, maxRadius: 100, life: 1.0 });
    }

    function activatePowerUp(type) {
        if (type === 'EXTRA_LIFE') { lives++; playPowerUpSound(); return; }
        if (type === 'TIME_CHARGE') { timeWarpCharge = Math.min(100, timeWarpCharge + 35); playPowerUpSound(); return; }
        if (type === 'HYPERSPACE_CHARGE') { hyperspaceCharge = Math.min(100, hyperspaceCharge + 35); playPowerUpSound(); return; }
        activePowerUp = type;
        powerUpTimer = POWERUP_TYPES[type].duration;
        playPowerUpSound();
    }

    function activateTimeWarp() {
        if (timeWarpCooldown > 0 || timeWarpCharge < 50) return;
        initAudio();
        timeWarpActive = true;
        timeWarpFreezeActive = true;
        timeWarpTimer = TIME_WARP_DURATION;
        timeWarpCooldown = TIME_WARP_COOLDOWN;
        timeWarpCharge -= 50;
        timeDistortionTarget = 0.3;
        asteroids.forEach(a => {
            a.frozen = true;
            a.originalSpeedX = a.speedX;
            a.originalSpeedY = a.speedY;
            a.originalRotationSpeed = a.rotationSpeed;
            a.speedX = 0;
            a.speedY = 0;
            a.rotationSpeed = 0;
        });
        setTimeout(() => {
            timeWarpFreezeActive = false;
            asteroids.forEach(a => {
                if (a.frozen) {
                    a.speedX = a.originalSpeedX;
                    a.speedY = a.originalSpeedY;
                    a.rotationSpeed = a.originalRotationSpeed;
                    a.frozen = false;
                }
            });
        }, TIME_WARP_FREEZE_DURATION);
        for (let i = 0; i < 20; i++) {
            createTemporalEcho(ship.x + (Math.random() - 0.5) * 100, ship.y + (Math.random() - 0.5) * 100);
        }
        gridOverlay.classList.add('time-warp');
        setTimeout(() => gridOverlay.classList.remove('time-warp'), TIME_WARP_FREEZE_DURATION);
        screenShake = 30;
        screenShakeIntensity = 5;
        chromaticAberrationIntensity = 3;
        playTimeWarpSound();
    }

    function activateHyperspace() {
        if (hyperspaceCooldown > 0 || hyperspaceCharge < 50) return;
        initAudio();
        hyperspaceActive = true;
        hyperspaceTimer = HYPERSPACE_DURATION;
        hyperspaceCooldown = HYPERSPACE_COOLDOWN;
        hyperspaceCharge -= 50;
        wormholeEffect = { x: ship.x, y: ship.y, radius: 0, maxRadius: 150, life: 1.0 };
        for (let i = 0; i < 30; i++) {
            const angle = (i / 30) * Math.PI * 2;
            const radius = 50 + Math.random() * 100;
            hyperspaceTrail.push({
                x: ship.x + Math.cos(angle) * radius,
                y: ship.y + Math.sin(angle) * radius,
                alpha: 1.0, radius: 2 + Math.random() * 3
            });
        }
        bulletPool.forEachActive(b => bulletPool.release(b));
        activePowerUp = 'SHIELD';
        powerUpTimer = 2000;
        gridOverlay.classList.add('hyperspace');
        setTimeout(() => gridOverlay.classList.remove('hyperspace'), HYPERSPACE_DURATION);
        screenShake = 60;
        screenShakeIntensity = 10;
        chromaticAberrationIntensity = 5;
        playHyperspaceSound();
    }

    function fireBullet() {
        const now = Date.now();
        const effectiveCooldown = activePowerUp === 'RAPID_FIRE' ? bulletCooldown * 0.3 : bulletCooldown;
        if (now - lastBulletTime < effectiveCooldown) return;
        lastBulletTime = now;
        initAudio();
        playFireSound();
        const bulletSpeed = 10;
        const trailBoost = comboMultiplier >= 5 ? 1.5 : 1;
        if (activePowerUp === 'RAPID_FIRE') {
            for (let i = -1; i <= 1; i++) {
                const angle = ship.angle + i * 0.15;
                spawnBullet(ship.x + Math.cos(ship.angle) * 20, ship.y + Math.sin(ship.angle) * 20, Math.cos(angle) * bulletSpeed, Math.sin(angle) * bulletSpeed, 40 * trailBoost);
            }
        } else if (activePowerUp === 'TEMPORAL_SHIFT') {
            for (let i = -1; i <= 1; i++) {
                const angle = ship.angle + i * 0.3;
                spawnBullet(ship.x + Math.cos(ship.angle) * 20, ship.y + Math.sin(ship.angle) * 20, Math.cos(angle) * bulletSpeed, Math.sin(angle) * bulletSpeed, 80, true);
            }
        } else {
            spawnBullet(ship.x + Math.cos(ship.angle) * 20, ship.y + Math.sin(ship.angle) * 20, Math.cos(ship.angle) * bulletSpeed, Math.sin(ship.angle) * bulletSpeed, 60 * trailBoost);
        }
    }

    function applyChromaticAberration(drawCallback) {
        if (chromaticAberrationIntensity <= 0) {
            drawCallback(0, 0);
            return;
        }
        const offset = chromaticAberrationIntensity;
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.33;
        ctx.save(); drawCallback(-offset, 0); ctx.restore();
        ctx.save(); drawCallback(0, 0); ctx.restore();
        ctx.save(); drawCallback(offset, 0); ctx.restore();
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
    }

    function drawGameObjects(offsetX, offsetY) {
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.shadowBlur = 15;
        
        shipTrail.forEach((t) => {
            ctx.shadowColor = t.color || colors.ship;
            ctx.strokeStyle = `rgba(${t.color === '#00ffff' ? '0, 255, 255' : '0, 255, 100'}, ${t.alpha})`;
            ctx.lineWidth = t.width;
            ctx.beginPath();
            ctx.moveTo(t.x1, t.y1);
            ctx.lineTo(t.x2, t.y2);
            ctx.stroke();
        });
        
        if (wormholeEffect && wormholeEffect.life > 0) {
            ctx.shadowColor = '#00ff64';
            const gradient = ctx.createRadialGradient(wormholeEffect.x, wormholeEffect.y, 0, wormholeEffect.x, wormholeEffect.y, wormholeEffect.radius);
            gradient.addColorStop(0, `rgba(0, 255, 100, ${wormholeEffect.life})`);
            gradient.addColorStop(1, 'rgba(0, 255, 100, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(wormholeEffect.x, wormholeEffect.y, wormholeEffect.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        hyperspaceTrail.forEach(point => {
            ctx.shadowColor = '#00ff64';
            ctx.fillStyle = `rgba(0, 255, 100, ${point.alpha})`;
            ctx.beginPath();
            ctx.arc(point.x, point.y, point.radius, 0, Math.PI * 2);
            ctx.fill();
        });
        
        temporalEchoes.forEach(echo => {
            ctx.shadowColor = '#8000ff';
            ctx.strokeStyle = `rgba(128, 0, 255, ${echo.alpha})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(echo.x, echo.y, echo.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        });
        
        particlePool.forEachActive(p => {
            ctx.shadowColor = p.color;
            const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 3);
            gradient.addColorStop(0, `rgba(0, 255, 255, ${p.life})`);
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
            ctx.fill();
        });
        
        explosionPool.forEachActive(e => {
            ctx.shadowColor = e.color;
            const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * 2);
            gradient.addColorStop(0, `rgba(${e.color === '#ff5500' ? '255, 85, 0' : '128, 0, 255'}, ${e.life})`);
            gradient.addColorStop(1, `rgba(${e.color === '#ff5500' ? '255, 85, 0' : '128, 0, 255'}, 0)`);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * 2, 0, Math.PI * 2);
            ctx.fill();
        });
        
        powerUps.forEach(p => {
            ctx.shadowColor = POWERUP_TYPES[p.type].color;
            ctx.font = `${p.size}px Arial`;
            ctx.fillStyle = POWERUP_TYPES[p.type].color;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(POWERUP_TYPES[p.type].symbol, p.x, p.y);
            const glowSize = p.size * (1 + Math.sin(Date.now() / 200) * 0.3);
            ctx.strokeStyle = POWERUP_TYPES[p.type].color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
            ctx.stroke();
        });
        
        asteroids.forEach(a => {
            ctx.save();
            ctx.translate(a.x, a.y);
            ctx.rotate(a.rotation);
            if (a.trail && a.trail.length > 1) {
                for (let i = 1; i < a.trail.length; i++) {
                    const alpha = i / a.trail.length * 0.3;
                    ctx.shadowColor = colors.asteroids;
                    ctx.strokeStyle = `rgba(0, 255, 153, ${alpha})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(a.trail[i-1].x - a.x, a.trail[i-1].y - a.y);
                    ctx.lineTo(a.trail[i].x - a.x, a.trail[i].y - a.y);
                    ctx.stroke();
                }
            }
            ctx.shadowColor = a.frozen ? '#8000ff' : colors.asteroids;
            ctx.shadowBlur = a.frozen ? 25 : 15;
            ctx.strokeStyle = a.frozen ? '#8000ff' : colors.asteroids;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(a.shape[0].x, a.shape[0].y);
            for (let i = 1; i < a.shape.length; i++) {
                ctx.lineTo(a.shape[i].x, a.shape[i].y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            if (a.hitsRequired > 1) {
                ctx.shadowColor = colors.asteroids;
                ctx.fillStyle = colors.asteroids;
                ctx.font = "12px 'Courier New', monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(`${a.hitsRequired - a.hitsTaken}`, a.x, a.y);
            }
        });
        
        if (ship.alive) {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            if (activePowerUp === 'SHIELD') {
                ctx.shadowColor = '#00ffff';
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, ship.size + 10, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.shadowColor = hyperspaceActive ? '#00ff64' : timeWarpActive ? '#8000ff' : colors.ship;
            ctx.strokeStyle = ctx.shadowColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-10, -8);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-10, 8);
            ctx.closePath();
            ctx.stroke();
            const engineIntensity = Math.min(1, (Math.abs(ship.velX) + Math.abs(ship.velY)) * 3);
            if (engineIntensity > 0.02) {
                ctx.shadowColor = '#00ffff';
                ctx.fillStyle = `rgba(0, 255, 255, ${engineIntensity})`;
                ctx.beginPath();
                ctx.moveTo(-5, -3 * engineIntensity * 5);
                ctx.lineTo(-10 - engineIntensity * 10, 0);
                ctx.lineTo(-5, 3 * engineIntensity * 5);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }
        
        bulletPool.forEachActive(b => {
            const bulletColor = b.temporal ? '#ff00ff' : colors.bullets;
            const trailSize = comboMultiplier >= 5 ? 6 : 4;
            ctx.shadowColor = bulletColor;
            ctx.strokeStyle = bulletColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x - b.velX * 0.5, b.y - b.velY * 0.5);
            ctx.stroke();
            const gradient = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, trailSize);
            gradient.addColorStop(0, bulletColor);
            gradient.addColorStop(1, "transparent");
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(b.x, b.y, trailSize, 0, Math.PI * 2);
            ctx.fill();
        });
        
        ctx.restore();
    }

    function drawHUD() {
        ctx.shadowBlur = 0;
        ctx.fillStyle = colors.hud;
        ctx.font = "20px 'Courier New', monospace";
        ctx.textAlign = "left";
        ctx.fillText(`LIVES: ${lives}`, 20, 30);
        ctx.fillText(`SCORE: ${score}`, 20, 60);
        ctx.fillText(`LEVEL: ${level}`, 20, 90);
        if (comboMultiplier > 1 && comboTimer > 0) {
            const comboAlpha = Math.min(1, comboTimer / 60);
            ctx.fillStyle = `rgba(${comboMultiplier >= 5 ? '255, 204, 0' : '255, 255, 255'}, ${comboAlpha})`;
            ctx.font = comboMultiplier >= 5 ? "bold 24px 'Courier New', monospace" : "20px 'Courier New', monospace";
            ctx.fillText(`COMBO x${comboMultiplier}!`, 20, 120);
        }
        ctx.font = "16px 'Courier New', monospace";
        ctx.fillStyle = '#8000ff';
        ctx.fillText(`⏱️ WARP: ${Math.floor(timeWarpCharge)}%`, 20, canvas.height - 120);
        ctx.fillStyle = '#00ff64';
        ctx.fillText(`🌌 HYPER: ${Math.floor(hyperspaceCharge)}%`, 20, canvas.height - 95);
        if (timeWarpCooldown > 0) {
            ctx.fillStyle = 'rgba(128, 0, 255, 0.5)';
            ctx.fillText(`CD: ${(timeWarpCooldown / 60).toFixed(1)}s`, 160, canvas.height - 120);
        }
        if (hyperspaceCooldown > 0) {
            ctx.fillStyle = 'rgba(0, 255, 100, 0.5)';
            ctx.fillText(`CD: ${(hyperspaceCooldown / 60).toFixed(1)}s`, 160, canvas.height - 95);
        }
        if (activePowerUp && powerUpTimer > 0) {
            const timeLeft = (powerUpTimer / 1000).toFixed(1);
            const barWidth = 200 * (powerUpTimer / POWERUP_TYPES[activePowerUp].duration);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(20, 145, 200, 15);
            ctx.fillStyle = POWERUP_TYPES[activePowerUp].color;
            ctx.fillRect(20, 145, barWidth, 15);
            ctx.strokeStyle = colors.hud;
            ctx.lineWidth = 1;
            ctx.strokeRect(20, 145, 200, 15);
            ctx.fillText(`${activePowerUp}: ${timeLeft}s`, 20, 140);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        if (screenShake > 0) {
            const shakeX = (Math.random() - 0.5) * screenShakeIntensity;
            const shakeY = (Math.random() - 0.5) * screenShakeIntensity;
            ctx.translate(shakeX, shakeY);
            screenShake--;
            screenShakeIntensity *= 0.9;
        }
        
        updateNebulaBackground();
        renderNebulaBackground();
        
        if (demoMode) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = colors.hud;
            ctx.font = "48px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("SYSTEM BOOT", canvas.width / 2, canvas.height / 2 - 30);
            ctx.font = "24px 'Courier New', monospace";
            ctx.fillText("TAP TO INITIATE", canvas.width / 2, canvas.height / 2 + 20);
            ctx.restore();
            return;
        }
        
        if (chromaticAberrationIntensity > 0.5) {
            applyChromaticAberration((ox, oy) => drawGameObjects(ox, oy));
        } else {
            drawGameObjects(0, 0);
        }
        
        if (timeWarpActive || activePowerUp === 'TEMPORAL_SHIFT') {
            ctx.fillStyle = 'rgba(128, 0, 255, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        if (hyperspaceActive) {
            ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        drawHUD();
        
        if (gameOver) {
            ctx.fillStyle = `rgba(10, 10, 18, ${fadeAlpha})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = colors.hud;
            ctx.font = "48px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("SYSTEM FAILURE", canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "24px 'Courier New', monospace";
            ctx.fillText(`REBOOT IN ${Math.ceil(countdownTimer / 60)}...`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.fillRect(playAgainRect.x, playAgainRect.y, playAgainRect.w, playAgainRect.h);
            ctx.strokeStyle = colors.hud;
            ctx.lineWidth = 2;
            ctx.strokeRect(playAgainRect.x, playAgainRect.y, playAgainRect.w, playAgainRect.h);
            ctx.fillStyle = colors.hud;
            ctx.font = "20px 'Courier New', monospace";
            ctx.fillText("MANUAL OVERRIDE", playAgainRect.x + playAgainRect.w / 2, playAgainRect.y + 30);
            if (fadeAlpha < 0.7) fadeAlpha += 0.02;
        }
        ctx.restore();
    }

    // ===== UPDATE LOOP =====
    function update() {
        if (demoMode || !gameStarted) return;
        if (gameOver) {
            countdownTimer--;
            if (countdownTimer <= 0) { demoMode = true; gameStarted = false; }
            return;
        }

        chromaticAberrationIntensity *= 0.95;
        if (chromaticAberrationIntensity < 0.1) chromaticAberrationIntensity = 0;

        if (timeWarpActive) {
            timeWarpTimer -= 16;
            if (timeWarpTimer <= 0) { timeWarpActive = false; timeDistortionTarget = 1.0; }
        }
        if (timeWarpCooldown > 0) timeWarpCooldown -= 16;
        if (hyperspaceActive) {
            hyperspaceTimer -= 16;
            if (hyperspaceTimer <= 0) hyperspaceActive = false;
        }
        if (hyperspaceCooldown > 0) hyperspaceCooldown -= 16;
        
        timeDistortion += (timeDistortionTarget - timeDistortion) * 0.1;
        timeWarpCharge = Math.min(100, timeWarpCharge + 0.05);
        hyperspaceCharge = Math.min(100, hyperspaceCharge + 0.03);
        if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) comboMultiplier = 1; }

        if (wormholeEffect) {
            wormholeEffect.radius += (wormholeEffect.maxRadius - wormholeEffect.radius) * 0.1;
            wormholeEffect.life -= 0.05;
            powerUps.forEach(p => {
                const dx = wormholeEffect.x - p.x;
                const dy = wormholeEffect.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < wormholeEffect.radius) {
                    const pullStrength = 0.08 * (1 - dist / wormholeEffect.radius);
                    p.x += dx * pullStrength;
                    p.y += dy * pullStrength;
                }
            });
            asteroids.forEach(a => {
                if (a.size <= 30) {
                    const dx = wormholeEffect.x - a.x;
                    const dy = wormholeEffect.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < wormholeEffect.radius) {
                        const pullStrength = 0.03 * (1 - dist / wormholeEffect.radius);
                        a.x += dx * pullStrength;
                        a.y += dy * pullStrength;
                    }
                }
            });
            if (wormholeEffect.life <= 0) wormholeEffect = null;
        }

        particlePool.forEachActive(p => {
            asteroids.forEach(a => {
                if (a.size > 40) {
                    const dx = a.x - p.x;
                    const dy = a.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100 && dist > 0) {
                        const pullStrength = 0.001 * (1 - dist / 100);
                        p.velX += dx / dist * pullStrength;
                        p.velY += dy / dist * pullStrength;
                    }
                }
            });
            if (ship.alive) {
                const dx = ship.x - p.x;
                const dy = ship.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 60 && dist > 0) {
                    const pullStrength = 0.002 * (1 - dist / 60);
                    p.velX += dx / dist * pullStrength;
                    p.velY += dy / dist * pullStrength;
                }
            }
        });

        if (joystickActive && ship.alive) {
            const moveX = Math.cos(joystickAngle) * joystickPower * ship.speed * timeDistortion;
            const moveY = Math.sin(joystickAngle) * joystickPower * ship.speed * timeDistortion;
            ship.velX += moveX;
            ship.velY += moveY;
            ship.angle = joystickAngle;
        }

        if (ship.alive) {
            ship.x += ship.velX * timeDistortion;
            ship.y += ship.velY * timeDistortion;
            ship.velX *= ship.friction;
            ship.velY *= ship.friction;
            if (ship.x < -ship.size) ship.x = canvas.width + ship.size;
            if (ship.x > canvas.width + ship.size) ship.x = -ship.size;
            if (ship.y < -ship.size) ship.y = canvas.height + ship.size;
            if (ship.y > canvas.height + ship.size) ship.y = -ship.size;
            const acceleration = Math.sqrt(ship.velX * ship.velX + ship.velY * ship.velY) * 3;
            if (acceleration > 0.02) {
                updateEngineSound(Math.min(1, acceleration));
                if (Math.random() < acceleration) {
                    spawnParticle(ship.x - Math.cos(ship.angle) * 15, ship.y - Math.sin(ship.angle) * 15, -Math.cos(ship.angle) * 0.5 + (Math.random() - 0.5) * 0.5, -Math.sin(ship.angle) * 0.5 + (Math.random() - 0.5) * 0.5, hyperspaceActive ? '#00ff64' : timeWarpActive ? '#8000ff' : '#00ffff');
                }
            } else {
                updateEngineSound(0);
            }
            shipTrail.push({
                x1: ship.x - Math.cos(ship.angle) * 15,
                y1: ship.y - Math.sin(ship.angle) * 15,
                x2: ship.x - Math.cos(ship.angle) * (15 + acceleration * 20),
                y2: ship.y - Math.sin(ship.angle) * (15 + acceleration * 20),
                alpha: 0.6,
                width: 1 + acceleration * 3,
                color: hyperspaceActive ? '#00ff64' : timeWarpActive ? '#8000ff' : '#00ffff'
            });
            if (shipTrail.length > 20) shipTrail.shift();
        }

        if (fireTouchActive && ship.alive) fireBullet();

        shipTrail.forEach(t => t.alpha -= 0.03);
        for (let i = shipTrail.length - 1; i >= 0; i--) {
            if (shipTrail[i].alpha <= 0) shipTrail.splice(i, 1);
        }

        for (let i = hyperspaceTrail.length - 1; i >= 0; i--) {
            hyperspaceTrail[i].alpha -= 0.05;
            if (hyperspaceTrail[i].alpha <= 0) hyperspaceTrail.splice(i, 1);
        }

        for (let i = temporalEchoes.length - 1; i >= 0; i--) {
            temporalEchoes[i].radius += (temporalEchoes[i].maxRadius - temporalEchoes[i].radius) * 0.05;
            temporalEchoes[i].alpha -= 0.02;
            if (temporalEchoes[i].alpha <= 0) temporalEchoes.splice(i, 1);
        }

        particlePool.forEachActive(p => {
            p.x += p.velX * timeDistortion;
            p.y += p.velY * timeDistortion;
            p.life -= 0.03;
            if (p.life <= 0) particlePool.release(p);
        });

        explosionPool.forEachActive(e => {
            e.x += e.velX * timeDistortion;
            e.y += e.velY * timeDistortion;
            e.life -= 0.03;
            if (e.life <= 0) explosionPool.release(e);
        });

        bulletPool.forEachActive(b => {
            b.x += b.velX * timeDistortion;
            b.y += b.velY * timeDistortion;
            b.life--;
            if (b.life <= 0 || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
                bulletPool.release(b);
            }
        });

        asteroids.forEach(a => {
            if (!a.frozen) {
                a.x += a.speedX * timeDistortion;
                a.y += a.speedY * timeDistortion;
                a.rotation += a.rotationSpeed * timeDistortion;
            }
            if (a.x < -a.size) a.x = canvas.width + a.size;
            if (a.x > canvas.width + a.size) a.x = -a.size;
            if (a.y < -a.size) a.y = canvas.height + a.size;
            if (a.y > canvas.height + a.size) a.y = -a.size;
            if (!a.trail) a.trail = [];
            a.trail.push({ x: a.x, y: a.y });
            if (a.trail.length > 15) a.trail.shift();
        });

        for (let i = asteroids.length - 1; i >= 0; i--) {
            const a = asteroids[i];
            if (ship.alive && !hyperspaceActive) {
                const dx = ship.x - a.x;
                const dy = ship.y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < a.size / 2 + ship.size / 2 && activePowerUp !== "SHIELD") {
                    spawnExplosionParticles(ship.x, ship.y, 50, '#ff5500');
                    playExplosionSound();
                    ship.alive = false;
                    lives--;
                    comboMultiplier = 1;
                    comboTimer = 0;
                    screenShake = 40;
                    screenShakeIntensity = 8;
                    chromaticAberrationIntensity = 4;
                    if (lives <= 0) {
                        gameOver = true;
                    } else {
                        setTimeout(() => {
                            ship.x = canvas.width / 2;
                            ship.y = canvas.height / 2;
                            ship.velX = 0;
                            ship.velY = 0;
                            ship.alive = true;
                            timeWarpCharge = Math.min(100, timeWarpCharge + 20);
                            hyperspaceCharge = Math.min(100, hyperspaceCharge + 20);
                        }, 1000);
                    }
                }
            }
            
            bulletPool.forEachActive(b => {
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < a.size / 2 + 4) {
                    a.hitsTaken++;
                    if (b.temporal) a.hitsTaken++;
                    if (a.frozen) a.hitsTaken = a.hitsRequired;
                    const impactAngle = Math.atan2(b.velY, b.velX);
                    bulletPool.release(b);
                    if (a.hitsTaken >= a.hitsRequired) {
                        const now = Date.now();
                        if (now - lastKillTime < 2000) {
                            comboMultiplier = Math.min(comboMultiplier + 1, 10);
                            if (comboMultiplier > lastComboPlayed) {
                                playComboSound(comboMultiplier);
                                lastComboPlayed = comboMultiplier;
                            }
                        } else {
                            comboMultiplier = 1;
                            lastComboPlayed = 0;
                        }
                        lastKillTime = now;
                        comboTimer = 120;
                        spawnExplosionParticles(a.x, a.y, a.size, timeWarpActive ? '#8000ff' : '#ff5500', a.speedX, a.speedY);
                        playExplosionSound();
                        spawnPowerUp(a.x, a.y);
                        const baseScore = Math.floor(a.size);
                        score += baseScore * comboMultiplier;
                        asteroids.splice(i, 1);
                        if (a.size > 30) {
                            const newSize = a.size / 2;
                            const numFragments = 2 + Math.floor(Math.random() * 2);
                            const baseAngle = impactAngle;
                            for (let k = 0; k < numFragments; k++) {
                                const spreadAngle = baseAngle + (k - (numFragments - 1) / 2) * (Math.PI / (2 + Math.random() * 2));
                                const fragmentSpeed = 2 + Math.random() * 3;
                                spawnAsteroid(a.x + Math.cos(spreadAngle) * 8, a.y + Math.sin(spreadAngle) * 8, Math.cos(spreadAngle) * fragmentSpeed, Math.sin(spreadAngle) * fragmentSpeed, newSize, a.frozen);
                            }
                        }
                        screenShake = Math.min(20, a.size / 3);
                        screenShakeIntensity = a.size / 15;
                    }
                }
            });
        }

        for (let i = powerUps.length - 1; i >= 0; i--) {
            const p = powerUps[i];
            p.life--;
            if (p.life <= 0) { powerUps.splice(i, 1); continue; }
            const magnetRadius = comboMultiplier >= 5 ? 60 : 30;
            if (ship.alive) {
                const dx = ship.x - p.x;
                const dy = ship.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (comboMultiplier >= 5 && dist < 150) {
                    const pullStrength = 0.03;
                    p.x += dx / dist * pullStrength;
                    p.y += dy / dist * pullStrength;
                }
                if (dist < p.size + magnetRadius) {
                    activatePowerUp(p.type);
                    powerUps.splice(i, 1);
                }
            }
        }

        if (activePowerUp && powerUpTimer > 0) {
            powerUpTimer -= 16;
            if (powerUpTimer <= 0) activePowerUp = null;
        }

        if (asteroids.length === 0 && !gameOver) {
            level++;
            if (level > maxLevel) level = maxLevel;
            startLevel();
        }
    }

    function loop() {
        if (!gameStarted && !demoMode) return;
        update();
        draw();
        if (!gameOver || demoMode) requestAnimationFrame(loop);
    }

    // ===== TOUCH EVENT HANDLERS =====
    joystickZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (joystickTouchId === null) {
            const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = touch.clientX - rect.left;
            joystickStartY = touch.clientY - rect.top;
            joystickCurrentX = joystickStartX;
            joystickCurrentY = joystickStartY;
            joystickVisual.style.display = 'block';
            joystickVisual.style.left = `${joystickStartX}px`;
            joystickVisual.style.top = `${joystickStartY}px`;
            joystickActive = true;
        }
        initAudio();
    });

    joystickZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            if (touch.identifier === joystickTouchId) {
                const rect = joystickZone.getBoundingClientRect();
                joystickCurrentX = touch.clientX - rect.left;
                joystickCurrentY = touch.clientY - rect.top;
                const dx = joystickCurrentX - joystickStartX;
                const dy = joystickCurrentY - joystickStartY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 100;
                joystickAngle = Math.atan2(dy, dx);
                joystickPower = Math.min(dist / maxDist, 1);
                const limitedDist = Math.min(dist, maxDist);
                joystickVisual.style.left = `${joystickStartX + Math.cos(joystickAngle) * limitedDist}px`;
                joystickVisual.style.top = `${joystickStartY + Math.sin(joystickAngle) * limitedDist}px`;
                break;
            }
        }
    });

    window.addEventListener('touchend', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joystickTouchId) {
                joystickActive = false;
                joystickTouchId = null;
                joystickPower = 0;
                joystickVisual.style.display = 'none';
            }
        }
    });

    window.addEventListener('touchcancel', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joystickTouchId) {
                joystickActive = false;
                joystickTouchId = null;
                joystickPower = 0;
                joystickVisual.style.display = 'none';
            }
        }
    });

    fireButton.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (fireTouchId === null && e.changedTouches.length > 0) {
            fireTouchId = e.changedTouches[0].identifier;
            fireTouchActive = true;
        }
        initAudio();
    });

    fireButton.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === fireTouchId) {
                fireTouchActive = false;
                fireTouchId = null;
                break;
            }
        }
    });

    fireButton.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        e.stopPropagation();
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === fireTouchId) {
                fireTouchActive = false;
                fireTouchId = null;
                break;
            }
        }
    });

    specialButton.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (ship.alive) activateTimeWarp();
    });

    hyperspaceButton.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (ship.alive) activateHyperspace();
    });

    // ===== MOUSE CONTROLS =====
    fireButton.addEventListener('click', () => { if (ship.alive) fireBullet(); });
    specialButton.addEventListener('click', () => { if (ship.alive) activateTimeWarp(); });
    hyperspaceButton.addEventListener('click', () => { if (ship.alive) activateHyperspace(); });
    fireButton.addEventListener('mousedown', (e) => { e.preventDefault(); });
    specialButton.addEventListener('mousedown', (e) => { e.preventDefault(); });
    hyperspaceButton.addEventListener('mousedown', (e) => { e.preventDefault(); });

    joystickZone.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        initAudio();
        const rect = joystickZone.getBoundingClientRect();
        joystickStartX = e.clientX - rect.left;
        joystickStartY = e.clientY - rect.top;
        joystickCurrentX = joystickStartX;
        joystickCurrentY = joystickStartY;
        joystickVisual.style.display = 'block';
        joystickVisual.style.left = `${joystickStartX}px`;
        joystickVisual.style.top = `${joystickStartY}px`;
        joystickActive = true;
    });

    window.addEventListener('mousemove', (e) => {
        if (!joystickActive) return;
        const rect = joystickZone.getBoundingClientRect();
        joystickCurrentX = e.clientX - rect.left;
        joystickCurrentY = e.clientY - rect.top;
        const dx = joystickCurrentX - joystickStartX;
        const dy = joystickCurrentY - joystickStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = 100;
        joystickAngle = Math.atan2(dy, dx);
        joystickPower = Math.min(dist / maxDist, 1);
        const limitedDist = Math.min(dist, maxDist);
        joystickVisual.style.left = `${joystickStartX + Math.cos(joystickAngle) * limitedDist}px`;
        joystickVisual.style.top = `${joystickStartY + Math.sin(joystickAngle) * limitedDist}px`;
    });

    window.addEventListener('mouseup', (e) => {
        if (e.button !== 0) return;
        joystickActive = false;
        joystickPower = 0;
        joystickVisual.style.display = 'none';
    });

    // ===== KEYBOARD CONTROLS =====
    window.addEventListener('keydown', (e) => {
        if (!ship.alive) return;
        initAudio();
        switch(e.key.toLowerCase()) {
            case ' ': e.preventDefault(); fireBullet(); break;
            case 'q': activateTimeWarp(); break;
            case 'e': activateHyperspace(); break;
        }
    });

    // ===== CANVAS CLICK =====
    canvas.addEventListener('click', (e) => {
        initAudio();
        if (demoMode) return resetGame();
        if (gameOver) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (x > playAgainRect.x && x < playAgainRect.x + playAgainRect.w &&
                y > playAgainRect.y && y < playAgainRect.y + playAgainRect.h) {
                resetGame();
            }
        }
    });

    // ===== INITIALIZATION =====
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    ship.x = canvas.width / 2;
    ship.y = canvas.height / 2;
    initNebulaSystem();
    demoMode = true;
    draw();
    </script>
</body>
</html>
